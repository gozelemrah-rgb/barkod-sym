<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Barkod → .SYM</title>
<script src="https://unpkg.com/@zxing/library@0.19.3/umd/index.min.js"></script>
<style>
  :root {
    --bg: #f4f1eb;
    --surface: #ffffff;
    --border: #d6d0c4;
    --accent: #2d5a3d;
    --accent-light: #e8f0ea;
    --text: #1a1a18;
    --muted: #7a7670;
    --danger: #8b2020;
    --danger-light: #fbeaea;
    --mono: 'Courier New', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Georgia', serif;
    min-height: 100vh;
    padding: 1.5rem 1rem 3rem;
  }
  header {
    text-align: center;
    margin-bottom: 1.5rem;
  }
  header h1 {
    font-size: 1.5rem;
    font-weight: normal;
    letter-spacing: 0.05em;
    color: var(--accent);
  }
  header p {
    font-size: 0.8rem;
    color: var(--muted);
    margin-top: 4px;
    font-family: var(--mono);
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    max-width: 480px;
    margin: 0 auto 1rem;
  }
  .card-header {
    background: var(--accent);
    color: #fff;
    padding: 10px 16px;
    font-size: 0.8rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-family: var(--mono);
  }
  .card-body { padding: 16px; }

  label {
    display: block;
    font-size: 0.75rem;
    color: var(--muted);
    margin-bottom: 5px;
    font-family: var(--mono);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  input[type="text"], input[type="number"] {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: 5px;
    font-size: 1rem;
    font-family: var(--mono);
    background: var(--bg);
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
  }
  input:focus { border-color: var(--accent); }

  .row { display: flex; gap: 8px; align-items: flex-end; margin-top: 10px; }
  .row input[type="number"] { width: 80px; flex-shrink: 0; }

  button {
    cursor: pointer;
    border: 1px solid var(--border);
    border-radius: 5px;
    background: var(--surface);
    color: var(--text);
    font-family: var(--mono);
    font-size: 0.85rem;
    padding: 10px 14px;
    transition: background 0.12s, border-color 0.12s;
    white-space: nowrap;
  }
  button:hover { background: var(--bg); border-color: var(--accent); }
  button.primary {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }
  button.primary:hover { background: #224a30; }
  button.danger { color: var(--danger); border-color: #e0b0b0; }
  button.danger:hover { background: var(--danger-light); }

  #cameraArea {
    display: none;
    background: #000;
    padding: 12px 16px 16px;
    border-bottom: 1px solid var(--border);
  }
  #cameraArea video {
    width: 100%;
    border-radius: 5px;
    display: block;
  }
  .scan-line {
    width: 80%;
    height: 2px;
    background: rgba(255, 80, 80, 0.85);
    margin: 8px auto;
    border-radius: 1px;
  }
  #stopBtn { margin-top: 8px; width: 100%; color: #fff; background: #333; border-color: #555; }
  #stopBtn:hover { background: #555; }

  #listArea {
    max-height: 280px;
    overflow-y: auto;
  }
  #emptyMsg {
    padding: 2rem;
    text-align: center;
    font-size: 0.8rem;
    color: var(--muted);
    font-family: var(--mono);
  }
  table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
  thead tr { background: var(--bg); }
  th {
    padding: 8px 12px;
    text-align: left;
    font-family: var(--mono);
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--muted);
    font-weight: normal;
    border-bottom: 1px solid var(--border);
  }
  td { padding: 8px 12px; border-bottom: 1px solid #eeece6; vertical-align: middle; }
  td.barcode-cell { font-family: var(--mono); font-size: 0.82rem; word-break: break-all; }
  td input[type="number"] {
    width: 60px;
    padding: 5px 7px;
    font-size: 0.85rem;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: var(--bg);
    text-align: center;
  }
  .del-btn {
    background: none;
    border: none;
    color: #bbb;
    font-size: 1.2rem;
    padding: 0 4px;
    line-height: 1;
  }
  .del-btn:hover { color: var(--danger); background: none; }

  .footer-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 16px;
    border-top: 1px solid var(--border);
    background: var(--bg);
  }
  .footer-row span { font-size: 0.78rem; color: var(--muted); font-family: var(--mono); }

  .actions {
    max-width: 480px;
    margin: 0 auto;
    display: flex;
    gap: 8px;
  }
  .actions button { flex: 1; padding: 12px; }

  #statusMsg {
    max-width: 480px;
    margin: 10px auto 0;
    font-size: 0.78rem;
    font-family: var(--mono);
    color: var(--muted);
    text-align: center;
    min-height: 18px;
  }
</style>
</head>
<body>

<header>
  <h1>Barkod → .SYM</h1>
  <p>Mikro Yazılım etiket dosyası oluşturucu</p>
</header>

<div class="card">
  <div class="card-header">Barkod Girişi</div>
  <div id="cameraArea">
    <video id="video" autoplay playsinline></video>
    <div class="scan-line"></div>
    <button id="stopBtn">▪ Kamerayı Kapat</button>
  </div>
  <div class="card-body">
    <label>Barkod Numarası</label>
    <input type="text" id="manualInput" inputmode="numeric" placeholder="Barkodu girin veya okutun..." autocomplete="off" />
    <div class="row">
      <div style="flex:1;">
        <label>Adet</label>
        <input type="number" id="qtyInput" min="1" value="1" />
      </div>
      <button id="addBtn" class="primary">+ Ekle</button>
      <button id="scanBtn">📷 Kamera</button>
    </div>
  </div>
</div>

<div class="card">
  <div class="card-header">Liste</div>
  <div id="listArea">
    <div id="emptyMsg">— henüz barkod eklenmedi —</div>
    <table id="itemTable" style="display:none;">
      <thead>
        <tr>
          <th>#</th>
          <th>Barkod</th>
          <th style="text-align:center;">Adet</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>
  <div class="footer-row">
    <span>Toplam: <strong id="totalCount">0</strong> kalem</span>
    <button class="danger" id="clearBtn">Temizle</button>
  </div>
</div>

<div class="actions">
  <button class="primary" id="exportBtn">⬇ .SYM Dosyası İndir</button>
</div>

<div id="statusMsg"></div>

<script>
let items = [];
let stream = null;
let codeReader = null;
let scanning = false;

const manualInput = document.getElementById('manualInput');
const qtyInput = document.getElementById('qtyInput');
const addBtn = document.getElementById('addBtn');
const scanBtn = document.getElementById('scanBtn');
const stopBtn = document.getElementById('stopBtn');
const exportBtn = document.getElementById('exportBtn');
const clearBtn = document.getElementById('clearBtn');
const cameraArea = document.getElementById('cameraArea');
const tableBody = document.getElementById('tableBody');
const itemTable = document.getElementById('itemTable');
const emptyMsg = document.getElementById('emptyMsg');
const totalCount = document.getElementById('totalCount');
const statusMsg = document.getElementById('statusMsg');
const video = document.getElementById('video');

let statusTimer = null;
function setStatus(msg, color) {
  statusMsg.textContent = msg;
  statusMsg.style.color = color || 'var(--muted)';
  if (statusTimer) clearTimeout(statusTimer);
  if (msg) statusTimer = setTimeout(() => { statusMsg.textContent = ''; }, 3500);
}

function addItem(barcode, qty) {
  barcode = barcode.trim();
  if (!barcode) { setStatus('Barkod boş olamaz.', 'var(--danger)'); return false; }
  qty = parseInt(qty) || 1;
  if (qty < 1) qty = 1;
  const existing = items.find(i => i.barcode === barcode);
  if (existing) {
    existing.qty += qty;
    renderTable();
    setStatus('Güncellendi: ' + barcode + ' → ' + existing.qty + ' adet');
  } else {
    items.push({ barcode, qty });
    renderTable();
    setStatus('Eklendi: ' + barcode);
  }
  manualInput.value = '';
  qtyInput.value = '1';
  manualInput.focus();
  return true;
}

function renderTable() {
  totalCount.textContent = items.length;
  if (items.length === 0) {
    emptyMsg.style.display = 'block';
    itemTable.style.display = 'none';
    return;
  }
  emptyMsg.style.display = 'none';
  itemTable.style.display = 'table';
  tableBody.innerHTML = items.map((item, i) => `
    <tr>
      <td style="color:var(--muted);font-family:var(--mono);font-size:0.75rem;">${i+1}</td>
      <td class="barcode-cell">${item.barcode}</td>
      <td style="text-align:center;">
        <input type="number" min="1" value="${item.qty}" data-idx="${i}" class="qtyEdit" />
      </td>
      <td style="text-align:right;">
        <button class="del-btn" data-idx="${i}">&times;</button>
      </td>
    </tr>
  `).join('');

  document.querySelectorAll('.del-btn').forEach(btn => {
    btn.onclick = () => { items.splice(parseInt(btn.dataset.idx), 1); renderTable(); setStatus('Silindi.'); };
  });
  document.querySelectorAll('.qtyEdit').forEach(inp => {
    inp.oninput = () => {
      const v = parseInt(inp.value);
      if (!isNaN(v) && v >= 1) items[parseInt(inp.dataset.idx)].qty = v;
    };
  });
}

addBtn.onclick = () => addItem(manualInput.value, qtyInput.value);
manualInput.onkeydown = e => { if (e.key === 'Enter') addItem(manualInput.value, qtyInput.value); };
qtyInput.onkeydown = e => { if (e.key === 'Enter') addItem(manualInput.value, qtyInput.value); };

clearBtn.onclick = () => {
  if (items.length === 0) return;
  if (confirm('Listeyi tamamen temizlemek istiyor musunuz?')) { items = []; renderTable(); setStatus('Liste temizlendi.'); }
};

exportBtn.onclick = () => {
  if (items.length === 0) { setStatus('Liste boş. Önce barkod ekleyin.', 'var(--danger)'); return; }
  const content = items.map(i => i.barcode + ';' + i.qty).join('\n');
  const blob = new Blob([content], { type: 'text/plain' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const now = new Date();
  const pad = n => String(n).padStart(2,'0');
  const ts = now.getFullYear() + '' + pad(now.getMonth()+1) + '' + pad(now.getDate()) + '_' + pad(now.getHours()) + pad(now.getMinutes());
  a.href = url;
  a.download = 'liste_' + ts + '.sym';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  setStatus('İndirildi: liste_' + ts + '.sym');
};

scanBtn.onclick = async () => {
  if (scanning) return;
  if (!window.ZXing) { setStatus('Kamera kütüphanesi henüz yüklenmedi, bekleyin.', 'var(--danger)'); return; }
  try {
    stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
    video.srcObject = stream;
    cameraArea.style.display = 'block';
    scanning = true;
    setStatus('Barkodu kameraya gösterin...');
    codeReader = new ZXing.BrowserMultiFormatReader();
    codeReader.decodeFromVideoDevice(null, video, (result, err) => {
      if (result) {
        const code = result.getText();
        stopCamera();
        manualInput.value = code;
        qtyInput.value = '1';
        qtyInput.focus();
        qtyInput.select();
        setStatus('Barkod okundu: ' + code);
      }
    });
  } catch(e) {
    setStatus('Kamera erişimi sağlanamadı. Tarayıcı izinlerini kontrol edin.', 'var(--danger)');
  }
};

stopBtn.onclick = stopCamera;

function stopCamera() {
  scanning = false;
  if (codeReader) { try { codeReader.reset(); } catch(e) {} codeReader = null; }
  if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
  video.srcObject = null;
  cameraArea.style.display = 'none';
}
</script>
</body>
</html>
